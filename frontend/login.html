<body class="bg-background text-on-background min-h-screen flex items-center justify-center relative overflow-hidden font-body-md">
<!-- Background Layer: Digital Grid / Deep Space -->
<div class="absolute inset-0 z-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px]"></div>
<div class="absolute inset-0 z-0 bg-gradient-to-tr from-surface-container-lowest via-surface-dim to-surface-container-highest opacity-90"></div>
<div class="absolute inset-0 z-0 radial-gradient-blob">
<!-- Abstract light trails simulated with CSS gradients -->
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-container/10 rounded-full blur-[100px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-secondary-container/10 rounded-full blur-[120px]"></div>
</div>
<!-- Login Card (Glassmorphism) -->
<div class="relative z-10 w-full max-w-md p-lg bg-surface-container/40 backdrop-blur-[20px] rounded-xl border border-white/10 shadow-[0_0_30px_rgba(0,240,255,0.05)] border-t-[rgba(255,255,255,0.2)] border-l-[rgba(255,255,255,0.1)]">
<!-- Header -->
<div class="text-center mb-xl">
<span class="material-symbols-outlined text-[48px] text-surface-tint drop-shadow-[0_0_8px_rgba(0,219,233,0.5)] mb-md block">
                enhanced_encryption
            </span>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs tracking-tight">Cloud Vault</h1>
<p class="font-mono-data text-mono-data text-outline tracking-widest uppercase">Secure Access Node</p>
</div>
<!-- Form -->
<form class="space-y-lg">
<!-- Core ID Input -->
<div class="relative">
<label class="sr-only" for="core-id">Core ID</label>
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">badge</span>
</div>
<input autocomplete="off" class="w-full bg-surface-container-high/50 border-0 border-b border-outline-variant text-on-surface font-mono-data text-mono-data px-4 py-3 pl-10 focus:ring-0 focus:border-surface-tint focus:bg-surface-container-high transition-colors duration-150 ease-linear placeholder-outline/50" id="core-id" placeholder="Core ID" type="text"/>
</div>
<!-- Neural Key Input -->
<div class="relative">
<label class="sr-only" for="neural-key">Neural Key</label>
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">vpn_key</span>
</div>
<input class="w-full bg-surface-container-high/50 border-0 border-b border-outline-variant text-on-surface font-mono-data text-mono-data px-4 py-3 pl-10 focus:ring-0 focus:border-surface-tint focus:bg-surface-container-high transition-colors duration-150 ease-linear placeholder-outline/50" id="neural-key" placeholder="Neural Key" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer">
<span class="material-symbols-outlined text-outline hover:text-surface-tint transition-colors text-lg">visibility_off</span>
</div>
</div>
<!-- Biometric Verification Placeholder -->
<div class="mt-md p-md border border-outline-variant/30 rounded-lg bg-surface-container-low/50 flex flex-col items-center justify-center gap-xs cursor-pointer hover:border-surface-tint/50 transition-colors duration-150 group">
<span class="material-symbols-outlined text-[32px] text-outline group-hover:text-surface-tint transition-colors">
                    fingerprint
                </span>
<span class="font-label-caps text-label-caps text-outline group-hover:text-surface-tint transition-colors">Biometric Verification</span>
</div>
<!-- Action Area -->
<div class="pt-md flex flex-col gap-md">
<button class="w-full bg-surface-tint text-on-primary font-label-caps text-label-caps py-4 px-6 rounded hover:shadow-[0_0_15px_rgba(0,219,233,0.3)] transition-all duration-150 ease-linear uppercase tracking-widest font-bold" type="button">
                    Initiate Session
                </button>
<div class="flex justify-between items-center text-xs font-mono-data text-outline">
<a class="hover:text-surface-tint transition-colors" href="#">Request Access</a>
<a class="hover:text-surface-tint transition-colors" href="#">System Status</a>
</div>
</div>
</form>
<!-- Decorative Micro-elements -->
<div class="absolute top-2 left-2 w-1 h-1 bg-surface-tint rounded-full shadow-[0_0_5px_rgba(0,219,233,0.8)]"></div>

<div class="w-1 h-1 bg-surface-tint rounded-full"></div><div class="w-1 h-1 bg-surface-tint rounded-full"></div><div class="w-1 h-1 bg-surface-tint rounded-full opacity-0"></div><div class="w-1 h-1 bg-surface-tint rounded-full"></div>
<div class="w-1 h-1 bg-surface-tint rounded-full"></div><div class="w-1 h-1 bg-surface-tint rounded-full"></div><div class="w-1 h-1 bg-surface-tint rounded-full"></div><div class="w-1 h-1 bg-surface-tint rounded-full"></div>
</div>
